name: Release

# Cuts a GitHub Release (and tag) whenever the VERSION file names a version that
# has no release yet. lazy.nvim users can then pin `version = "v0.1.0"` or track
# main. Can also be run manually.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# Serialize release runs — never cancel one mid-publish; a queued run is
# idempotent for an already-released version (m1-tools#27).
concurrency:
  group: ${{ github.workflow }}-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: v
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(tr -d ' \t\n\r' < VERSION)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if gh release view "v$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Release v$VERSION already exists — nothing to do."
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Will release v$VERSION."
          fi
      - name: Publish release
        if: steps.v.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v${{ steps.v.outputs.version }}
        run: |
          # Body: auto-generated "What's Changed" (PR list + full changelog
          # link) followed by a consume/install snippet. PR titles may contain
          # backticks, so the generated half never passes through an unquoted
          # heredoc; the static half is a quoted heredoc with placeholders
          # substituted afterwards.
          gh api "repos/$GITHUB_REPOSITORY/releases/generate-notes" \
            -f tag_name="$TAG" -f target_commitish="$GITHUB_SHA" \
            -q .body > body.md || echo "_Generated notes unavailable._" > body.md
          cat >> body.md <<'NOTES'

          ## Install

          ```lua
          -- lazy.nvim (requires nvim-m1)
          { "{{REPO}}", version = "{{TAG}}", dependencies = { "C-Nucifora/nvim-m1" } }
          ```
          NOTES
          sed -i "s|{{REPO}}|$GITHUB_REPOSITORY|g; s|{{TAG}}|$TAG|g" body.md
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "telescope-m1.nvim $TAG" \
            --notes-file body.md
